name: Bug 报告 / Bug Report
description: 提交一个 Bug 报告以帮助我们改进项目
title: "[Bug] "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您花时间提交 Bug 报告！请尽可能详细地填写以下信息，这将帮助我们更快地定位和修复问题。

  - type: dropdown
    id: platform
    attributes:
      label: 平台 / Platform
      description: 您遇到问题的平台
      options:
        - macOS
        - iOS
        - 两者皆是 / Both
      default: 0
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 版本号 / Version
      description: 您正在使用的 OAMS 版本号（如 1.0.0）
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: 操作系统版本 / OS Version
      description: 您的 macOS/iOS 版本号（如 macOS 15.0 / iOS 17.5）
      placeholder: "macOS 15.0"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: 设备型号 / Device Model
      description: 您的设备型号（如 MacBook Pro M3 / iPhone 15 Pro）
      placeholder: "MacBook Pro M3"

  - type: textarea
    id: description
    attributes:
      label: 问题描述 / Description
      description: 清晰简洁地描述您遇到的 Bug
      placeholder: |
        当我尝试...时，发生了...的问题。
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤 / Steps to Reproduce
      description: 提供详细的步骤来复现该问题
      placeholder: |
        1. 打开应用
        2. 点击 '...'
        3. 滚动到 '...'
        4. 出现错误
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 期望行为 / Expected Behavior
      description: 清晰简洁地描述您期望发生的行为
      placeholder: |
        我期望...，但实际上...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为 / Actual Behavior
      description: 清晰简洁地描述实际发生的行为
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志与错误信息 / Logs
      description: 如果有崩溃日志或控制台输出，请粘贴在此处
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: 截图 / Screenshots
      description: 如果适用，请添加截图以帮助说明问题

  - type: checkboxes
    id: checklist
    attributes:
      label: 检查清单 / Checklist
      description: 在提交之前，请确认以下事项
      options:
        - label: 我已经搜索过现有的 Issues，确认这不是重复报告
          required: true
        - label: 我已经升级到最新版本，问题仍然存在
          required: true
        - label: 我已经提供了足够的信息来复现这个问题
          required: true
