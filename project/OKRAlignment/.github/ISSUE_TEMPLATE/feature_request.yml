name: 功能请求 / Feature Request
description: 提交一个新功能请求或改进建议
title: "[Feature] "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        感谢您为 OAMS 提出新功能建议！我们期待听到您的想法。

  - type: textarea
    id: description
    attributes:
      label: 功能描述 / Feature Description
      description: 清晰简洁地描述您希望添加的功能
      placeholder: |
        我希望 OAMS 能够...
    validations:
      required: true

  - type: textarea
    id: use_case
    attributes:
      label: 使用场景 / Use Case
      description: 描述这个功能将如何解决您的问题或在什么场景下使用
      placeholder: |
        在我的日常工作中，我需要...
        这个功能将帮助我...
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: 预期行为 / Expected Behavior
      description: 清晰简洁地描述您期望这个功能如何工作
      placeholder: |
        当用户...时，应用应该...
        用户可以通过...来访问这个功能
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案 / Alternatives
      description: 您考虑过哪些替代方案？其他应用是如何实现类似功能的？
      placeholder: |
        我目前通过...来 workaround 这个问题
        其他应用如...是这样实现的...

  - type: textarea
    id: mockup
    attributes:
      label: 界面草图 / Mockup
      description: 如果您有界面草图或示意图，请在此上传或描述

  - type: dropdown
    id: priority
    attributes:
      label: 优先级 / Priority
      description: 您认为这个功能的重要程度
      options:
        - 低 / Low（锦上添花）
        - 中 / Medium（使用更方便）
        - 高 / High（影响核心工作流）
        - 紧急 / Critical（阻碍基本使用）
      default: 1

  - type: textarea
    id: additional
    attributes:
      label: 其他说明 / Additional Context
      description: 任何其他与此功能请求相关的信息
