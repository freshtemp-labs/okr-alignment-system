name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-latest

    strategy:
      matrix:
        xcode: ['16.0']
        destination:
          - 'platform=macOS'
          - 'platform=iOS Simulator,name=iPhone 16'

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode ${{ matrix.xcode }}
      run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app/Contents/Developer

    - name: Show Xcode Version
      run: xcodebuild -version

    - name: Show Build Settings
      run: xcrun swift --version

    - name: Swift Build (macOS)
      if: matrix.destination == 'platform=macOS'
      run: swift build

    - name: Resolve Package Dependencies
      run: xcodebuild -resolvePackageDependencies

    - name: Build
      run: |
        xcodebuild build-for-testing \
          -scheme "OKRAlignment" \
          -destination "${{ matrix.destination }}" \
          -derivedDataPath DerivedData \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty

    - name: Run Tests
      run: |
        xcodebuild test-without-building \
          -scheme "OKRAlignment" \
          -destination "${{ matrix.destination }}" \
          -derivedDataPath DerivedData \
          -enableCodeCoverage YES \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty --report junit --output test-results.xml

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.destination == 'platform=macOS' && 'macos' || 'ios' }}
        path: test-results.xml

    - name: Generate Code Coverage Report
      if: matrix.destination == 'platform=macOS'
      run: |
        xcrun llvm-cov export \
          -format=lcov \
          -instr-profile=$(find DerivedData -name "*.profdata") \
          $(find DerivedData -name "OKRAlignment") > coverage.lcov

    - name: Upload Coverage to Codecov
      if: matrix.destination == 'platform=macOS'
      uses: codecov/codecov-action@v4
      with:
        files: coverage.lcov
        flags: unittests
        name: codecov-umbrella

  code-quality:
    name: Code Quality Check
    runs-on: macos-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode 16.0
      run: sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer

    - name: SwiftLint
      run: |
        if command -v swiftlint &> /dev/null; then
          swiftlint lint --reporter github-actions-logging
        else
          echo "SwiftLint not installed, skipping..."
        fi

    - name: Check Format (swift-format)
      run: |
        if command -v swift-format &> /dev/null; then
          swift-format lint -r --parallel Sources/ Tests/
        else
          echo "swift-format not installed, skipping..."
        fi

    - name: Doc Comment Check
      run: |
        echo "Checking public API documentation..."
        # 验证所有 public/internal 声明都有文档注释
        UNDOCUMENTED=$(grep -r "public " Sources/ --include="*.swift" -A1 | grep -v "//" | grep -v "/\*" | grep -c "public " || true)
        echo "Public declarations without doc comments: $UNDOCUMENTED"
