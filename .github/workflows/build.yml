name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    defaults:
      run:
        working-directory: project/OKRAlignment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(ls -d /Applications/Xcode.app 2>/dev/null)
          fi
          if [ -z "$XCODE_PATH" ]; then
            echo "::warning::No Xcode found, using default"
          else
            sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          fi
          echo "=== Xcode ===" && xcodebuild -version
          echo "=== Swift ===" && swift --version

      - name: Swift Build
        run: swift build

      - name: Compile Test Target Only
        run: |
          echo "=== Compile test target ==="
          swift test list 2>&1 || true
          echo "=== Build test target ==="
          swift build --build-tests 2>&1 || true
        continue-on-error: true

      - name: Run Tests
        id: test
        run: |
          swift test --verbose 2>&1 | tee test_output.log
        continue-on-error: true

      - name: Show Last 100 Lines of Test Output
        if: steps.test.outcome != 'success'
        run: |
          echo "=== Last 100 lines of test output ==="
          tail -100 test_output.log

      - name: Upload Test Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: project/OKRAlignment/test_output.log
