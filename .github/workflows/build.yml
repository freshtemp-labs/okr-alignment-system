name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    defaults:
      run:
        working-directory: project/OKRAlignment

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XCODE_PATH" ]; then
            XCODE_PATH=$(xcode-select -p | sed 's|/Contents/Developer||')
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Xcode: $($XCODE_PATH/Contents/Developer/usr/bin/xcodebuild -version)"
          swift --version

      - name: Swift Build
        run: swift build

      - name: Swift Test
        run: swift test
